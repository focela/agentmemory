version: 2

project_name: agentmemory

# Skip binary builds: this project ships a Docker image (see publish.yml).
# Used only for changelog generation and release creation; not for builds.
builds:
  - skip: true

changelog:
  disable: false
  # GitHub API provides author attribution and a Contributors section.
  # Requires a previous tag to exist; v0.1.0 satisfies this constraint.
  use: github
  sort: asc

  # Match Conventional Commits with optional scope and breaking-change marker.
  groups:
    - title: Features
      regexp: ^.*?feat(\(.+\))??!?:.+$
      order: 0
    - title: Bug Fixes
      regexp: ^.*?fix(\(.+\))??!?:.+$
      order: 1
    - title: Enhancements
      regexp: ^.*?(perf|refactor|chore)(\(.+\))??!?:.+$
      order: 2
    - title: Build process updates / CI
      regexp: ^.*?(build|ci)(\(.+\))??!?:.+$
      order: 3
    - title: Documentation updates
      regexp: ^.*?docs?(\(.+\))??!?:.+$
      order: 4
    - title: Others
      order: 999

release:
  github:
    owner: focela
    name: agentmemory

  # Mark as prerelease when tag has a SemVer prerelease suffix (e.g. -rc.1).
  prerelease: auto

  # Append link to the published Docker image after the changelog.
  footer: |
    ## Docker image

    ```
    docker pull ghcr.io/focela/agentmemory:{{ .Version }}
    ```

    Multi-arch (linux/amd64, linux/arm64) image is published by `publish.yml`.
