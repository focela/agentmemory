name: agentmemory

services:
  agentmemory:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind to localhost; use Nginx HTTPS or SSH for remote access.
    # Public access needs "3111:3111", AGENTMEMORY_SECRET, and a firewall.
    ports:
      - "127.0.0.1:3111:3111"
      - "127.0.0.1:3113:13113"
    volumes:
      # Named volumes are reset when Docker Desktop rebuilds its Linux VM.
      # Set AGENTMEMORY_DATA_DIR in docker/.env for non-default data paths.
      - ${AGENTMEMORY_DATA_DIR:-../data}:/data
    # LLM config is optional; required: false needs Docker Compose 2.24+.
    # Manual: cp config/server.env.example docker/.env.server
    env_file:
      - path: .env.server
        required: false
    environment:
      AGENTMEMORY_DATA_DIR: /data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3111/agentmemory/livez || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Viewer listens on 127.0.0.1:3113 inside container (loopback only).
  # socat binds 0.0.0.0:13113 and forwards traffic to 127.0.0.1:3113.
  viewer-proxy:
    image: alpine/socat
    network_mode: "service:agentmemory"
    depends_on:
      agentmemory:
        condition: service_healthy
    restart: unless-stopped
    command: ["TCP-LISTEN:13113,fork,reuseaddr,bind=0.0.0.0", "TCP:127.0.0.1:3113"]
    healthcheck:
      test: ["CMD-SHELL", "socat /dev/null TCP:127.0.0.1:13113 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

